<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Ambientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.10.1/mqtt.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #070d1a;
  --surface:     #0d1628;
  --surface-2:   #121e35;
  --border:      rgba(56,189,248,.12);
  --border-h:    rgba(56,189,248,.35);
  --accent:      #38bdf8;
  --accent-dim:  rgba(56,189,248,.15);
  --accent-glow: rgba(56,189,248,.25);
  --warm:        #fb923c;
  --warm-dim:    rgba(251,146,60,.15);
  --cool:        #818cf8;
  --cool-dim:    rgba(129,140,248,.15);
  --green:       #34d399;
  --red:         #f87171;
  --text-1:      #f0f6ff;
  --text-2:      #94a3b8;
  --text-3:      #4a5a72;
  --radius:      16px;
  --radius-sm:   10px;
  --shadow:      0 8px 32px rgba(0,0,0,.6);
  --shadow-card: 0 4px 24px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.04) inset;
}

html { font-size: 16px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  overflow-x: hidden;
}

/* background grain + grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2338bdf8' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 80px; }

/* ─── HEADER ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
  gap: 16px;
  flex-wrap: wrap;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-icon {
  width: 44px; height: 44px;
  background: var(--accent-dim);
  border: 1px solid var(--border-h);
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 1.3rem;
}

.brand h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.35rem;
  letter-spacing: -.02em;
  color: var(--text-1);
}

.brand p {
  font-size: .75rem;
  color: var(--text-3);
  font-weight: 400;
  margin-top: 1px;
}

.header-actions { display: flex; align-items: center; gap: 12px; }

/* ─── STATUS BADGE ─── */
.conn-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: .78rem;
  font-family: 'DM Mono', monospace;
  color: var(--text-2);
  transition: all .3s;
}

.conn-badge.connected { border-color: rgba(52,211,153,.3); color: var(--green); }
.conn-badge.error     { border-color: rgba(248,113,113,.3); color: var(--red); }

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-3);
  transition: background .3s;
}
.conn-badge.connected .dot { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
.conn-badge.error     .dot { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}

/* ─── BOTÃO PRIMÁRIO ─── */
.btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-h);
  background: var(--accent-dim);
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn:hover { background: rgba(56,189,248,.25); border-color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
.btn svg { flex-shrink: 0; }

/* ─── GRID DE AMBIENTES ─── */
.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* ─── CARD DE AMBIENTE ─── */
.room-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: border-color .3s, box-shadow .3s, transform .2s;
  box-shadow: var(--shadow-card);
  animation: cardIn .4s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.room-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity .3s;
}

.room-card:hover { border-color: var(--border-h); box-shadow: 0 8px 40px rgba(0,0,0,.6), 0 0 0 1px var(--border-h); }
.room-card:hover::before { opacity: 1; }

.room-card.online { border-color: rgba(56,189,248,.2); }
.room-card.offline { border-color: rgba(248,113,113,.15); }
.room-card.offline::before { background: linear-gradient(90deg, transparent, var(--red), transparent); opacity: .5; }

/* Glow de fundo temático */
.room-card .card-glow {
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  top: -60px; right: -60px;
  background: var(--accent-glow);
  opacity: .4;
  transition: opacity .3s;
}
.room-card:hover .card-glow { opacity: .7; }

/* ─── CARD HEADER ─── */
.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
}

.room-info { flex: 1; min-width: 0; }

.room-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--accent-dim);
  border: 1px solid var(--border-h);
  display: grid;
  place-items: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  margin-left: 12px;
}

.room-label {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--text-1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.room-topic {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  color: var(--text-3);
  margin-top: 3px;
}

/* ─── STATUS CHIP ─── */
.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: .7rem;
  font-weight: 500;
  margin-top: 6px;
  border: 1px solid transparent;
}
.status-chip.online  { background: rgba(52,211,153,.1);  border-color: rgba(52,211,153,.25); color: var(--green); }
.status-chip.offline { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.25); color: var(--red); }
.status-chip.waiting { background: rgba(148,163,184,.07); border-color: rgba(148,163,184,.15); color: var(--text-3); }
.status-chip .sdot   { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.status-chip.online .sdot { animation: pulse 2s infinite; }

/* ─── MÉTRICAS ─── */
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.metric {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}

.metric.temp { border-left: 2px solid var(--warm); }
.metric.hum  { border-left: 2px solid var(--cool); }

.metric-label {
  font-size: .68rem;
  color: var(--text-3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.metric.temp .metric-label { color: var(--warm); }
.metric.hum  .metric-label { color: var(--cool); }

.metric-value {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  line-height: 1;
  color: var(--text-1);
  transition: all .4s;
}

.metric-unit {
  font-family: 'DM Mono', monospace;
  font-size: .8rem;
  color: var(--text-3);
  margin-top: 3px;
}

/* ─── BARRA DE PROGRESSO ─── */
.bar-wrap {
  margin-top: 10px;
}
.bar-label {
  display: flex;
  justify-content: space-between;
  font-size: .68rem;
  color: var(--text-3);
  margin-bottom: 4px;
}
.bar-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.metric.temp .bar-fill { background: linear-gradient(90deg, #fcd34d, #f97316); }
.metric.hum  .bar-fill { background: linear-gradient(90deg, #818cf8, #38bdf8); }

/* ─── FOOTER DO CARD ─── */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.last-update {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  color: var(--text-3);
}

.card-actions { display: flex; gap: 8px; }

.icon-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-3);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: all .2s;
  font-size: .8rem;
}
.icon-btn:hover { background: var(--surface-2); border-color: var(--border-h); color: var(--text-2); }
.icon-btn.del:hover { border-color: rgba(248,113,113,.4); color: var(--red); background: rgba(248,113,113,.08); }

/* ─── CARD PLACEHOLDER (+ adicionar) ─── */
.add-card {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 40px 24px;
  cursor: pointer;
  transition: all .25s;
  min-height: 280px;
  background: transparent;
  color: var(--text-3);
  animation: cardIn .4s ease both;
}
.add-card:hover {
  border-color: var(--border-h);
  color: var(--accent);
  background: var(--accent-dim);
}
.add-card .add-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  border: 2px dashed currentColor;
  display: grid;
  place-items: center;
  font-size: 1.5rem;
  transition: transform .25s;
}
.add-card:hover .add-icon { transform: scale(1.1) rotate(5deg); }
.add-card span { font-size: .85rem; font-weight: 500; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(7,13,26,.85);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-h);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 32px 64px rgba(0,0,0,.7);
  transform: scale(.95) translateY(16px);
  transition: transform .25s;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }

.modal h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.25rem;
  margin-bottom: 6px;
}
.modal p { font-size: .85rem; color: var(--text-2); margin-bottom: 24px; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 7px;
}
.form-group input, .form-group select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text-1);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  outline: none;
  transition: border .2s, box-shadow .2s;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.form-group select option { background: var(--surface); }

.icon-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.icon-opt {
  width: 40px; height: 40px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 1.1rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: all .15s;
}
.icon-opt:hover, .icon-opt.sel { border-color: var(--accent); background: var(--accent-dim); }

.modal-actions { display: flex; gap: 10px; margin-top: 24px; }
.btn-cancel {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  cursor: pointer;
  transition: all .2s;
}
.btn-cancel:hover { border-color: var(--border-h); color: var(--text-1); }
.btn-primary {
  flex: 2;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.btn-primary:hover { background: rgba(56,189,248,.3); box-shadow: 0 0 20px var(--accent-glow); }

/* ─── MQTT CONFIG SECTION ─── */
.mqtt-cfg-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
}
.mqtt-cfg-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.mqtt-cfg-head h3 {
  font-family: 'Syne', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  color: var(--text-2);
}
.mqtt-cfg-body { margin-top: 20px; display: none; }
.mqtt-cfg-body.show { display: block; }
.cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .cfg-grid { grid-template-columns: 1fr; } }

/* ─── TOAST ─── */
.toast-wrap {
  position: fixed;
  bottom: 24px; right: 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 200;
}
.toast {
  padding: 12px 18px;
  border-radius: 10px;
  font-size: .83rem;
  font-weight: 500;
  border: 1px solid;
  box-shadow: var(--shadow);
  animation: toastIn .3s ease;
  pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateX(20px) } to { opacity:1; transform:translateX(0) } }
.toast.success { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); color: var(--green); }
.toast.error   { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: var(--red); }
.toast.info    { background: var(--accent-dim); border-color: var(--border-h); color: var(--accent); }

/* ─── RESPONSIVO ─── */
@media (max-width: 600px) {
  .rooms-grid { grid-template-columns: 1fr; }
  header { flex-direction: column; align-items: flex-start; }
  .header-actions { width: 100%; justify-content: flex-end; }
  .metrics { grid-template-columns: 1fr 1fr; }
}

/* ─── SHIMMER (loading) ─── */
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.shimmer {
  background: linear-gradient(90deg, var(--surface-2) 25%, rgba(255,255,255,.05) 50%, var(--surface-2) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-icon">🌡️</div>
      <div>
        <h1>AmbientWatch</h1>
        <p>Monitoramento de temperatura e humidade</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="conn-badge" id="connBadge">
        <div class="dot"></div>
        <span id="connLabel">Desconectado</span>
      </div>
      <button class="btn" id="btnMqttCfg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 19.07a10 10 0 0 1 0-14.14"/><path d="M22.5 12a10.5 10.5 0 0 1-10.5 10.5"/><path d="M12 1.5A10.5 10.5 0 0 1 22.5 12"/></svg>
        MQTT
      </button>
      <button class="btn" id="btnAddRoom">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ambiente
      </button>
    </div>
  </header>

  <!-- MQTT CONFIG (collapsible) -->
  <div class="mqtt-cfg-section" id="mqttCfgSection" style="display:none">
    <div class="mqtt-cfg-head" id="mqttCfgHead">
      <h3>⚙️ Configuração MQTT</h3>
      <svg id="cfgChevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="mqtt-cfg-body" id="mqttCfgBody">
      <div class="cfg-grid">
        <div class="form-group">
          <label>Broker (host)</label>
          <input id="cfgBroker" type="text" placeholder="xxxx.hivemq.cloud">
        </div>
        <div class="form-group">
          <label>Porta</label>
          <input id="cfgPort" type="number" value="8884" placeholder="8884">
        </div>
        <div class="form-group">
          <label>Usuário</label>
          <input id="cfgUser" type="text" placeholder="seu-usuario">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input id="cfgPass" type="password" placeholder="••••••••">
        </div>
      </div>
      <button class="btn-primary" id="btnConnect" style="width:100%;margin-top:4px">Conectar ao MQTT</button>
    </div>
  </div>

  <!-- ROOMS GRID -->
  <div class="rooms-grid" id="roomsGrid">
    <!-- cards aqui -->
    <div class="add-card" id="addCardPlaceholder">
      <div class="add-icon">+</div>
      <span>Adicionar ambiente</span>
      <small style="font-size:.75rem;color:var(--text-3)">Clique para monitorar um novo local</small>
    </div>
  </div>

</div>

<!-- MODAL ADICIONAR AMBIENTE -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Novo Ambiente</h2>
    <p>Configure o ambiente que deseja monitorar via MQTT.</p>

    <div class="form-group">
      <label>Nome do Ambiente</label>
      <input id="mLabel" type="text" placeholder="ex: Sala de Estar, Quarto, Servidor...">
    </div>
    <div class="form-group">
      <label>ID / Tópico MQTT</label>
      <input id="mTopic" type="text" placeholder="ex: sala → sensors/sala/data">
      <div style="font-size:.7rem;color:var(--text-3);margin-top:4px">Tópico completo: sensors/<strong id="topicPreview">...</strong>/data</div>
    </div>
    <div class="form-group">
      <label>Ícone</label>
      <div class="icon-picker" id="iconPicker">
        <div class="icon-opt sel" data-icon="🏠">🏠</div>
        <div class="icon-opt" data-icon="🛏️">🛏️</div>
        <div class="icon-opt" data-icon="🍳">🍳</div>
        <div class="icon-opt" data-icon="🖥️">🖥️</div>
        <div class="icon-opt" data-icon="🌿">🌿</div>
        <div class="icon-opt" data-icon="🚿">🚿</div>
        <div class="icon-opt" data-icon="🏋️">🏋️</div>
        <div class="icon-opt" data-icon="🌞">🌞</div>
        <div class="icon-opt" data-icon="⚙️">⚙️</div>
        <div class="icon-opt" data-icon="🏭">🏭</div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelModal">Cancelar</button>
      <button class="btn-primary" id="btnSaveRoom">✓ Adicionar</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ═════════════════════════════════════════
   STATE
═════════════════════════════════════════ */
let mqttClient = null;
let rooms = JSON.parse(localStorage.getItem('amb_rooms') || '[]');
let mqttCfg = JSON.parse(localStorage.getItem('amb_mqtt') || '{}');
let selectedIcon = '🏠';

const TIMEOUT_MS = 90000; // 90s sem dado → offline

/* ═════════════════════════════════════════
   UTILS
═════════════════════════════════════════ */
function saveRooms()   { localStorage.setItem('amb_rooms', JSON.stringify(rooms)); }
function saveMqttCfg() { localStorage.setItem('amb_mqtt',  JSON.stringify(mqttCfg)); }

function toast(msg, type='info', dur=3500) {
  const w = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), dur);
}

function formatTime(ts) {
  if (!ts) return '–';
  const d = new Date(ts);
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

/* ═════════════════════════════════════════
   RENDER
═════════════════════════════════════════ */
function renderRooms() {
  const grid = document.getElementById('roomsGrid');
  // Remove cards antigos (mantém o placeholder)
  grid.querySelectorAll('.room-card').forEach(c => c.remove());

  rooms.forEach((room, idx) => {
    const card = buildCard(room, idx);
    grid.insertBefore(card, document.getElementById('addCardPlaceholder'));
  });
}

function buildCard(room, idx) {
  const el = document.createElement('div');
  el.className = `room-card ${room.status || 'waiting'}`;
  el.id = `card-${room.id}`;

  const tempPct = room.temperature != null ? Math.min(100, Math.max(0, (room.temperature / 50) * 100)) : 0;
  const humPct  = room.humidity    != null ? Math.min(100, room.humidity) : 0;

  const tempVal = room.temperature != null ? room.temperature.toFixed(1) : '–';
  const humVal  = room.humidity    != null ? room.humidity.toFixed(1)    : '–';

  const statusText  = room.status === 'online' ? 'Online' : room.status === 'offline' ? 'Offline' : 'Aguardando';
  const statusClass = room.status === 'online' ? 'online'  : room.status === 'offline' ? 'offline'  : 'waiting';

  el.innerHTML = `
    <div class="card-glow"></div>
    <div class="card-head">
      <div class="room-info">
        <div class="room-label">${room.label}</div>
        <div class="room-topic">sensors/${room.topic}/data</div>
        <div class="status-chip ${statusClass}">
          <div class="sdot"></div> ${statusText}
        </div>
      </div>
      <div class="room-icon">${room.icon}</div>
    </div>
    <div class="metrics">
      <div class="metric temp">
        <div class="metric-label">🌡 Temperatura</div>
        <div class="metric-value" id="temp-${room.id}">${tempVal}</div>
        <div class="metric-unit">graus Celsius</div>
        <div class="bar-wrap">
          <div class="bar-label"><span>0°C</span><span>50°C</span></div>
          <div class="bar-track"><div class="bar-fill" id="bar-temp-${room.id}" style="width:${tempPct}%"></div></div>
        </div>
      </div>
      <div class="metric hum">
        <div class="metric-label">💧 Humidade</div>
        <div class="metric-value" id="hum-${room.id}">${humVal}</div>
        <div class="metric-unit">por cento</div>
        <div class="bar-wrap">
          <div class="bar-label"><span>0%</span><span>100%</span></div>
          <div class="bar-track"><div class="bar-fill" id="bar-hum-${room.id}" style="width:${humPct}%"></div></div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <div class="last-update">Atualizado: <span id="upd-${room.id}">${formatTime(room.lastUpdate)}</span></div>
      <div class="card-actions">
        <button class="icon-btn del" title="Remover ambiente" onclick="removeRoom(${idx})">✕</button>
      </div>
    </div>
  `;
  return el;
}

function updateCardData(roomId, data) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;

  room.temperature = data.temperature;
  room.humidity    = data.humidity;
  room.lastUpdate  = Date.now();
  room.status      = 'online';
  clearTimeout(room._timeout);
  room._timeout = setTimeout(() => setOffline(roomId), TIMEOUT_MS);
  saveRooms();

  // Update DOM diretamente (sem re-render total)
  const card = document.getElementById(`card-${roomId}`);
  if (!card) return;

  card.className = 'room-card online';
  card.querySelector('.status-chip').className   = 'status-chip online';
  card.querySelector('.status-chip').innerHTML   = '<div class="sdot"></div> Online';
  document.getElementById(`temp-${roomId}`).textContent = data.temperature.toFixed(1);
  document.getElementById(`hum-${roomId}`).textContent  = data.humidity.toFixed(1);
  document.getElementById(`upd-${roomId}`).textContent  = formatTime(room.lastUpdate);

  const tempPct = Math.min(100, (data.temperature / 50) * 100);
  const humPct  = Math.min(100, data.humidity);
  document.getElementById(`bar-temp-${roomId}`).style.width = tempPct + '%';
  document.getElementById(`bar-hum-${roomId}`).style.width  = humPct  + '%';
}

function setOffline(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;
  room.status = 'offline';
  saveRooms();
  const card = document.getElementById(`card-${roomId}`);
  if (!card) return;
  card.className = 'room-card offline';
  const chip = card.querySelector('.status-chip');
  chip.className = 'status-chip offline';
  chip.innerHTML = '<div class="sdot"></div> Offline';
}

/* ═════════════════════════════════════════
   ROOMS CRUD
═════════════════════════════════════════ */
function addRoom(label, topic, icon) {
  // Normaliza: minúsculas, sem espaços, só alfanumérico/_/-  (deve bater com device_id do ESP32)
  const id = topic.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '_');
  if (rooms.find(r => r.id === id)) { toast('Ambiente já existe!', 'error'); return; }
  // topic e id são iguais e normalizados — evita mismatch com tópico MQTT
  rooms.push({ id, label, topic: id, icon, status: 'waiting', temperature: null, humidity: null, lastUpdate: null });
  saveRooms();
  renderRooms();
  subscribeRoom(id);
  toast(`Ambiente "${label}" adicionado!`, 'success');
}

function removeRoom(idx) {
  const room = rooms[idx];
  if (!room) return;
  clearTimeout(room._timeout);
  if (mqttClient && mqttClient.connected) {
    mqttClient.unsubscribe(`sensors/${room.id}/data`);
  }
  rooms.splice(idx, 1);
  saveRooms();
  renderRooms();
  toast('Ambiente removido.', 'info');
}

/* ═════════════════════════════════════════
   MQTT
═════════════════════════════════════════ */
function subscribeRoom(roomId) {
  if (!mqttClient || !mqttClient.connected) {
    console.warn(`[MQTT] Não conectado — ambiente "${roomId}" será subscrito ao conectar.`);
    return;
  }
  const topic = `sensors/${roomId}/data`;
  mqttClient.subscribe(topic, { qos: 1 }, (err) => {
    if (!err) console.log(`[MQTT] ✅ Subscrito: ${topic}`);
    else      console.error(`[MQTT] ❌ Erro ao subscrever ${topic}:`, err);
  });
}

function connectMQTT() {
  const broker = document.getElementById('cfgBroker').value.trim();
  const port   = parseInt(document.getElementById('cfgPort').value) || 8884;
  const user   = document.getElementById('cfgUser').value.trim();
  const pass   = document.getElementById('cfgPass').value;

  if (!broker) { toast('Informe o broker!', 'error'); return; }

  mqttCfg = { broker, port, user, pass };
  saveMqttCfg();

  if (mqttClient) {
    try { mqttClient.end(true); } catch(e) {}
  }

  const url = `wss://${broker}:${port}/mqtt`;
  const opts = {
    clientId: 'dash_' + Math.random().toString(36).substr(2, 8),
    username: user,
    password: pass,
    clean: true,
    reconnectPeriod: 5000,
    connectTimeout: 10000,
  };

  setBadge('connecting');
  toast('Conectando ao MQTT...', 'info');

  mqttClient = mqtt.connect(url, opts);

  mqttClient.on('connect', () => {
    setBadge('connected');
    toast('MQTT conectado!', 'success');
    // Resubscreve todos os ambientes cadastrados
    if (rooms.length === 0) {
      console.warn('[MQTT] Nenhum ambiente cadastrado para subscrever.');
    }
    rooms.forEach(r => {
      const topic = `sensors/${r.id}/data`;
      mqttClient.subscribe(topic, { qos: 1 }, (err) => {
        if (!err) console.log(`[MQTT] ✅ Subscrito: ${topic}`);
        else      console.error(`[MQTT] ❌ Erro ao subscrever ${topic}:`, err);
      });
    });
    hideMqttCfg();
  });

  mqttClient.on('error', err => {
    setBadge('error');
    toast('Erro MQTT: ' + err.message, 'error');
  });

  mqttClient.on('close', () => {
    setBadge('disconnected');
  });

  mqttClient.on('message', (topic, message) => {
    console.log(`[MQTT] 📨 Mensagem recebida → tópico: ${topic}`);
    try {
      const data = JSON.parse(message.toString());
      console.log('[MQTT] Payload:', data);
      // topic: sensors/<device_id>/data  →  parts[1] === device_id
      const parts = topic.split('/');
      const deviceId = parts[1];
      // room.id é sempre igual ao device_id normalizado
      const room = rooms.find(r => r.id === deviceId);
      if (room) {
        console.log(`[MQTT] ✅ Atualizando card: ${deviceId}`);
        updateCardData(room.id, data);
      } else {
        console.warn(`[MQTT] ❌ Nenhum ambiente com id="${deviceId}". Ambientes cadastrados:`, rooms.map(r => r.id));
      }
    } catch(e) {
      console.warn('[MQTT] Parse error', e);
    }
  });
}

function setBadge(state) {
  const badge = document.getElementById('connBadge');
  const label = document.getElementById('connLabel');
  badge.className = 'conn-badge';
  if (state === 'connected')    { badge.classList.add('connected'); label.textContent = 'Conectado'; }
  else if (state === 'error')   { badge.classList.add('error');     label.textContent = 'Erro'; }
  else if (state === 'connecting') { label.textContent = 'Conectando...'; }
  else                           { label.textContent = 'Desconectado'; }
}

/* ═════════════════════════════════════════
   MQTT CONFIG PANEL
═════════════════════════════════════════ */
function showMqttCfg() {
  const sec = document.getElementById('mqttCfgSection');
  const body = document.getElementById('mqttCfgBody');
  sec.style.display = 'block';
  body.classList.add('show');
  document.getElementById('cfgChevron').style.transform = 'rotate(180deg)';
  // Preenche com salvo
  if (mqttCfg.broker) {
    document.getElementById('cfgBroker').value = mqttCfg.broker;
    document.getElementById('cfgPort').value   = mqttCfg.port || 8884;
    document.getElementById('cfgUser').value   = mqttCfg.user || '';
    document.getElementById('cfgPass').value   = mqttCfg.pass || '';
  }
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function hideMqttCfg() {
  const sec  = document.getElementById('mqttCfgSection');
  const body = document.getElementById('mqttCfgBody');
  body.classList.remove('show');
  document.getElementById('cfgChevron').style.transform = '';
  setTimeout(() => { if (!body.classList.contains('show')) sec.style.display = 'none'; }, 300);
}

document.getElementById('btnMqttCfg').addEventListener('click', () => {
  const sec = document.getElementById('mqttCfgSection');
  if (sec.style.display === 'none' || !sec.style.display) showMqttCfg();
  else hideMqttCfg();
});

document.getElementById('mqttCfgHead').addEventListener('click', () => {
  const body = document.getElementById('mqttCfgBody');
  const chev = document.getElementById('cfgChevron');
  body.classList.toggle('show');
  chev.style.transform = body.classList.contains('show') ? 'rotate(180deg)' : '';
});

document.getElementById('btnConnect').addEventListener('click', connectMQTT);

/* ═════════════════════════════════════════
   MODAL
═════════════════════════════════════════ */
function openModal() {
  document.getElementById('addModal').classList.add('open');
  document.getElementById('mLabel').focus();
}
function closeModal() {
  document.getElementById('addModal').classList.remove('open');
  document.getElementById('mLabel').value  = '';
  document.getElementById('mTopic').value  = '';
  document.getElementById('topicPreview').textContent = '...';
}

document.getElementById('btnAddRoom').addEventListener('click', openModal);
document.getElementById('addCardPlaceholder').addEventListener('click', openModal);
document.getElementById('btnCancelModal').addEventListener('click', closeModal);
document.getElementById('addModal').addEventListener('click', e => { if (e.target === document.getElementById('addModal')) closeModal(); });

document.getElementById('mTopic').addEventListener('input', e => {
  const val = e.target.value.trim() || '...';
  document.getElementById('topicPreview').textContent = val;
});

// Icon picker
document.getElementById('iconPicker').addEventListener('click', e => {
  const opt = e.target.closest('.icon-opt');
  if (!opt) return;
  document.querySelectorAll('.icon-opt').forEach(o => o.classList.remove('sel'));
  opt.classList.add('sel');
  selectedIcon = opt.dataset.icon;
});

document.getElementById('btnSaveRoom').addEventListener('click', () => {
  const label = document.getElementById('mLabel').value.trim();
  const topic = document.getElementById('mTopic').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '_');
  if (!label || !topic) { toast('Preencha todos os campos!', 'error'); return; }
  addRoom(label, topic, selectedIcon);
  closeModal();
});

/* ═════════════════════════════════════════
   INIT
═════════════════════════════════════════ */
window.removeRoom = removeRoom;

renderRooms();

// Restaura timeouts de offline para ambientes já carregados
rooms.forEach(room => {
  if (room.status === 'online' && room.lastUpdate) {
    const elapsed = Date.now() - room.lastUpdate;
    const remaining = TIMEOUT_MS - elapsed;
    if (remaining > 0) {
      room._timeout = setTimeout(() => setOffline(room.id), remaining);
    } else {
      room.status = 'offline';
    }
  }
});

// Auto-reconecta se tem config salva
if (mqttCfg.broker) {
  setTimeout(() => {
    document.getElementById('cfgBroker').value = mqttCfg.broker;
    document.getElementById('cfgPort').value   = mqttCfg.port || 8884;
    document.getElementById('cfgUser').value   = mqttCfg.user || '';
    document.getElementById('cfgPass').value   = mqttCfg.pass || '';
    connectMQTT();
  }, 800);
}
</script>
</body>
</html>
